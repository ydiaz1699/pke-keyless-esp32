; =============================================================================
; PKE + Keyless Start System - ESP32 Firmware
; Sistema de Entrada Pasiva Sin Llave + Encendido por Boton
; Plataforma: ESP32 (BLE)
; =============================================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Velocidad del monitor serial para debug
monitor_speed = 115200

; Particiones personalizadas para tener espacio para BLE + NVS
board_build.partitions = default.csv

; Frecuencia de CPU (240MHz para BLE estable)
board_build.f_cpu = 240000000L

; Librerias necesarias
lib_deps = 
    ; Criptografia AES para challenge-response
    rweather/Crypto@^0.4.0
    ; Manejo de JSON para configuracion y comunicacion
    bblanchon/ArduinoJson@^7.0.0
    ; CAN Bus (para modo CAN)
    sandeepmistry/CAN@^0.3.1

; Flags de compilacion
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=0
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
    ; Optimizacion de memoria BLE
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    -DCONFIG_BT_NIMBLE_MAX_BONDS=3

; Configuracion de upload
upload_speed = 921600

; Entorno de debug (opcional)
[env:esp32dev_debug]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_type = debug
build_flags = 
    -DCORE_DEBUG_LEVEL=5
    -DDEBUG_MODE=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
lib_deps = 
    rweather/Crypto@^0.4.0
    bblanchon/ArduinoJson@^7.0.0
    sandeepmistry/CAN@^0.3.1
